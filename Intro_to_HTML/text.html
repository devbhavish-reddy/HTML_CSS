<!DOCTYPE html>
<html>
  <head>
    <title>Video Info</title>
    <style>
      p {
        margin: 0;
        font-family: Arial;
      }

      .intro {
        font-weight: bold;
        font-size: 18px;
        line-height: 24px;
        width: 300px;
        margin-bottom: 5px;
      }

      .video-stats {
        font-weight: bold;
        color: rgb(96, 96, 96);
        font-size: 12px;
        margin-bottom: 20px;
      }

      .info {
        font-size: 14px;
        line-height: 20px;
        width: 290px;
        color: rgb(96, 96, 96);
      }

      .shopping {
        background-color: rgb(227, 65, 64);
        padding: 18px;
        color: white;
        font-size: 14px;
        text-align: center;
        margin: 200px 8px 0 8px;
      }

      a { text-decoration: none; }

      .span { color: white; }

      .span:hover { text-decoration: underline; }
    </style>
  </head>

  <body>
    <p class="intro">
      Talking Tech and AI with Google CEO Sundar Pichai!
    </p>

    <p class="video-stats">
      3.4M views &middot; Marquees Brownlee &check;
    </p>

    <p class="info">
      Talking tech and AI on the heels of Google I/O. 
      Also a daily driver phone reveal from Google's CEO. 
      Shoutout to Sundar!
    </p>

    <p class="shopping">
      Shop early for the best selection of holiday favourites.
      <a href="https://www.apple.com" target="_blank">
        <span class="span">SHOP NOW &gt;</span>
      </a>
    </p>
  </body>
</html>
