<!DOCTYPE html>
<html>
  <head>
    <title>Nike Dashboard</title>
    <style>
      .title {
        font-weight: bold;
      }

      .price {
        color: rgb(0, 118, 0);
      }

      .Cart {
        background-color: rgb(255, 216, 20);
        border-radius: 30px;
        height: 35px;
        width: 90px;
        cursor: pointer;
        border: none;
        font-size: 11px;
        font-weight: bold;
        transition: opacity 0.5s, box-shadow 0.9s;
      }

      .BuyNow {
        background-color: rgb(255, 164, 28);
        border-radius: 30px;
        height: 35px;
        width: 90px;
        cursor: pointer;
        border: none;
        font-size: 11px;
        font-weight: bold;
        transition: opacity 0.3s, box-shadow 0.9s;
        margin-left: 9px;
      }

      .Cart:hover, .BuyNow:hover {
        opacity: 0.8;
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.4);
      }

      .Cart:active, .BuyNow:active {
        opacity: 0.4;
      }

      a {
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <a href="https://www.amazon.in" target="_blank">
      Back to Amazon
    </a>

    <h1 class="title">NIKE Black Running Shoes</h1>

    <h2 class="price">$39 in Stock</h2>

    <h3 class="delivery-status">Free delivery TOMORROW.</h3>

    <button class="Cart">Add to Cart</button>
    <button class="BuyNow">Buy Now</button>
  </body>
</html>
