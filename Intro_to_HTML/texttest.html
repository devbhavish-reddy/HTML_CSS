<!DOCTYPE html>
<html>
  <head>
    <title>Test In Text</title>

    <style>
      .title {
        font-family: Verdana;
        font-weight: bold;
        font-size: x-large;
        margin-bottom: 5px;
      }

      .message {
        font-family: Verdana;
        color: rgb(96, 96, 96);
        margin-top: 0px;
      }

      .detail {
        font-family: Verdana;
        font-size: medium;
        width: 350px;
      }

      button {
        background-color: rgb(111, 196, 6);
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        color: white;
        transition: box-shadow 0.5s;
        cursor: pointer;
      }

      button:hover {
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4);
      }

      button:active {
        opacity: 0.6;
      }

      a {
        text-decoration: none;
        color: white;
      }
    </style>
  </head>

  <body>
    <h1 class="title">HTML CSS Course</h1>

    <p class="message">Beginner to Pro</p>

    <p class="detail">
      In this course we will learn the skills you need 
      to become a developer.
    </p>

    <button>
      <a href="https://www.coursera.org" target="_blank">
        Get Started
      </a>
    </button>
  </body>
</html>
